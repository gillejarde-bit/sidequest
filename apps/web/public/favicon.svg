<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="circular-mask">
      <!-- Perfectly clips the circular emblem, removing the square black corners -->
      <circle cx="256" cy="256" r="248" />
    </clipPath>
  </defs>
  <!-- Render the high-resolution logo.png inside the circular clip mask -->
  <image href="/logo.png" x="0" y="0" width="512" height="512" clip-path="url(#circular-mask)" />
</svg>